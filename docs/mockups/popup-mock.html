<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Video Balancer Popup Mock</title>
    <link rel="stylesheet" href="./popup-mock.css">
  </head>
  <body>
    <main class="mock-page" aria-label="Audio Video Balancer popup mock">
      <section class="browser-strip" aria-label="Browser frame mock">
        <div class="traffic" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="url">chrome-extension://audio-video-balancer/popup.html</div>
      </section>

      <section class="popup-shell" aria-label="Extension popup">
        <header class="popup-header">
          <div>
            <p class="eyebrow">Current tab</p>
            <h1>Audio Delay</h1>
          </div>
          <div class="status ready">
            <span class="status-dot" aria-hidden="true"></span>
            Off
          </div>
        </header>

        <section class="now-playing" aria-label="Active tab">
          <div>
            <p class="label">Audio delay</p>
            <p class="tab-title">Current tab</p>
          </div>
          <button class="capture-button" type="button" aria-label="Turn audio delay on">Off</button>
        </section>

        <section class="delay-readout controls-disabled" aria-label="Delay value" aria-disabled="true">
          <p class="label">Delay</p>
          <div class="delay-value">
            <span>200</span>
            <small>ms</small>
          </div>
        </section>

        <section class="slider-row controls-disabled" aria-label="Delay controls" aria-disabled="true">
          <button class="step-button" type="button" aria-label="Decrease delay by 5 milliseconds" disabled>-</button>
          <input type="range" min="0" max="1000" step="5" value="200" aria-label="Audio delay in milliseconds" disabled>
          <button class="step-button" type="button" aria-label="Increase delay by 5 milliseconds" disabled>+</button>
        </section>

        <section class="preset-grid controls-disabled" aria-label="Delay presets" aria-disabled="true">
          <button type="button" disabled>0</button>
          <button type="button" disabled>100</button>
          <button type="button" class="selected" disabled>200</button>
          <button type="button" disabled>300</button>
        </section>

        <footer class="popup-footer controls-disabled" aria-disabled="true">
          <button class="secondary" type="button" disabled>Reset</button>
          <p>Audio delay applies to this tab only.</p>
        </footer>
      </section>
    </main>
  </body>
</html>
