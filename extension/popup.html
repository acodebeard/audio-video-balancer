<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Video Balancer</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <p class="eyebrow">Current tab</p>
          <h1>Audio Delay</h1>
        </div>
        <div class="status ready">
          <span class="status-dot" aria-hidden="true"></span>
          Off
        </div>
      </header>

      <section class="now-playing" aria-label="Active tab">
        <div>
          <p class="label">Audio delay</p>
          <p class="tab-title">Current tab</p>
        </div>
        <button class="capture-button" type="button" aria-label="Turn audio delay on">Off</button>
      </section>

      <section class="delay-readout controls-disabled" aria-label="Delay value" aria-disabled="true">
        <p class="label">Delay</p>
        <div class="delay-value">
          <span id="delay-value">200</span>
          <small>ms</small>
        </div>
      </section>

      <section class="slider-row controls-disabled" aria-label="Delay controls" aria-disabled="true">
        <button class="step-button" type="button" data-step="-5" aria-label="Decrease delay by 5 milliseconds" disabled>-</button>
        <input id="delay-slider" type="range" min="0" max="1000" step="5" value="200" aria-label="Audio delay in milliseconds" disabled>
        <button class="step-button" type="button" data-step="5" aria-label="Increase delay by 5 milliseconds" disabled>+</button>
      </section>

      <section class="preset-grid controls-disabled" aria-label="Delay presets" aria-disabled="true">
        <button type="button" data-delay="0" disabled>0</button>
        <button type="button" data-delay="100" disabled>100</button>
        <button type="button" class="selected" data-delay="200" disabled>200</button>
        <button type="button" data-delay="300" disabled>300</button>
      </section>

      <footer class="popup-footer controls-disabled" aria-disabled="true">
        <button class="secondary" type="button" data-delay="0" disabled>Reset</button>
        <p>Audio delay applies to this tab only.</p>
      </footer>
    </main>
    <script src="./popup.js" type="module"></script>
  </body>
</html>
