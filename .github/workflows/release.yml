name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  chrome-zip:
    name: Build Chrome Extension ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package extension
        run: npm run package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            release/audio-video-balancer-chrome.zip \
            --title "Audio Video Balancer $TAG_NAME" \
            --notes "Installable Chrome extension ZIP built from tag $TAG_NAME."

